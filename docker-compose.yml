services:
  # PostgreSQL 15 Database
  db:
    image: postgres:15-alpine
    container_name: familycfo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: familycfo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d familycfo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - familycfo-network

  # Hasura GraphQL Engine
  hasura:
    image: hasura/graphql-engine:v2.40.0
    container_name: familycfo-hasura
    restart: unless-stopped
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@db:5432/familycfo
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256", "key":"your-super-secret-jwt-key-with-at-least-32-characters-for-development"}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - familycfo-network

  # Redis for caching (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: familycfo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - familycfo-network

  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: familycfo-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_HASURA_ENDPOINT=http://hasura:8080
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/next.config.ts:/app/next.config.ts
      - ./web/postcss.config.mjs:/app/postcss.config.mjs
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/components.json:/app/components.json
      - ./web/eslint.config.mjs:/app/eslint.config.mjs
      - ./web/next-env.d.ts:/app/next-env.d.ts
      - /app/node_modules
      - /app/.next
    depends_on:
      - hasura
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - familycfo-network

  # Docusaurus Documentation Site
  docs:
    build:
      context: .
      dockerfile: docs-site/Dockerfile
    container_name: familycfo-docs
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./docs-site/src:/app/src
      - ./docs-site/static:/app/static
      - ./docs-site/docusaurus.config.ts:/app/docusaurus.config.ts
      - ./docs-site/sidebars.ts:/app/sidebars.ts
      - ./docs-site/tsconfig.json:/app/tsconfig.json
      - ./docs:/app/docs
      - /app/node_modules
      - /app/build
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - familycfo-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  familycfo-network:
    driver: bridge 